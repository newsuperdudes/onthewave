name: Deploy Nebius Private
on:
  workflow_dispatch:
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout nebiusprivate
        uses: actions/checkout@v4
        with:
          repository: newsuperdudes/nebiusprivate
          token: ${{ secrets.GH_PAT }}
      - name: Deploy to /nebiusprivate via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: /nebiusprivate/
          local-dir: ./
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/README.md
